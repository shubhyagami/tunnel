name: Build EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller aiohttp

      - name: Build GUI client EXE
        run: pyinstaller --onefile --name tunnel-client --hidden-import aiohttp --hidden-import queue --hidden-import urllib.parse gui_client.py

      - name: Build CLI client EXE
        run: pyinstaller --onefile --name tunnel-cli --hidden-import aiohttp client.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-client-windows
          path: dist/*.exe
